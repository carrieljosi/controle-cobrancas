<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Controle de Cobranças</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
    }

    input, select, button {
      display: block;
      margin: 8px 0;
      padding: 8px;
      width: 100%;
    }

    .cliente {
      border-left: 5px solid gray;
      padding: 10px;
      margin-bottom: 10px;
      background: #fafafa;
    }

    .Pendente { border-left-color: red; }
    .Parcial { border-left-color: orange; }
    .Pago { border-left-color: green; }
  </style>
</head>

<body>

<h1>Controle de Cobranças</h1>

<div class="card">
  <input id="empresa" placeholder="Empresa">
  <input id="whatsapp" placeholder="WhatsApp">
  <input id="quantidade" type="number" placeholder="Quantidade">
  <input id="valor" type="number" placeholder="Valor unitário">

  <select id="status">
    <option>Pendente</option>
    <option>Parcial</option>
    <option>Pago</option>
  </select>

  <button onclick="adicionar()">Adicionar</button>
</div>

<div id="lista"></div>

<script>

let clientes = JSON.parse(localStorage.getItem("clientes")) || [];

function adicionar() {
  let empresa = document.getElementById("empresa").value;
  let whatsapp = document.getElementById("whatsapp").value;
  let quantidade = Number(document.getElementById("quantidade").value);
  let valor = Number(document.getElementById("valor").value);
  let status = document.getElementById("status").value;

  let total = quantidade * valor;

  let cliente = {
    empresa, whatsapp, quantidade, valor, total, status
  };

  clientes.push(cliente);

  localStorage.setItem("clientes", JSON.stringify(clientes));

  renderizar();
}

function renderizar() {
  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  clientes.forEach(c => {
    let div = document.createElement("div");
    div.className = "cliente " + c.status;

    div.innerHTML = `
      <b>${c.empresa}</b><br>
      WhatsApp: ${c.whatsapp}<br>
      Total: R$ ${c.total.toFixed(2)}<br>
      Status: ${c.status}
    `;

    lista.appendChild(div);
  });
}

renderizar();

</script>

</body>
</html>
